tls:
  certificates:
    - certFile: /certs/localhost.pem
      keyFile: /certs/localhost-key.pem

http:
  middlewares:
    kwh-cors:
      headers:
        accessControlAllowOriginList:
          - https://kwh.localtest.me
          - https://api-kwh.localtest.me
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
        addVaryHeader: true

  routers:
    kwh-router:
      rule: "Host(`kwh.localtest.me`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - kwh-cors
      service: kwh-svc
    
    kwh-api-router:
      rule: "Host(`api-kwh.localtest.me`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - kwh-cors
      service: kwh-api-svc

  services:
    kwh-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3200"

    kwh-api-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8001"