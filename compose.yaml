networks:
  local:
    external: true
  keycloak:
    driver: bridge
  temporal:
    driver: bridge
  kestra:
    driver: bridge
  # backstage:
  #   driver: bridge
volumes:
  keycloak-db-data:
    # external: true
    name: infra-keycloak-db
  rustfs-data:
    # external: true
    name: infra-rustfs-data
  temporal-db-data:
    # external: true
    name: infra-temporal-db
  kestra-db-data:
    # external: true
    name: infra-kestra-db
  kestra-data:
    # external: true
    name: infra-kestra-data
  # backstage-db-data:
  #   external: true
  #   name: infra-backstage-db
  clickhouse-data:
    # external: true
    name: infra-clickhouse-data
  linkding-data:
    # external: true
    name: infra-linkding-data